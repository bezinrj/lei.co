<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Lei.co</title>
    <link rel="icon" href="/icon-192.png" />
    <style>
      :root {
        --cream: #f7f4ee;
        --sage: #b8c9b0;
        --sage-dark: #7a9472;
        --text: #3a3631;
        --muted: #8a847b;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: var(--cream);
        color: var(--text);
        font-family: 'DM Sans', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
        text-align: center;
      }
      img.logo {
        width: 96px;
        height: 96px;
        border-radius: 22px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
        margin-bottom: 24px;
      }
      h1 {
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 500;
        font-size: 28px;
        letter-spacing: -0.01em;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 14px;
        max-width: 360px;
        line-height: 1.5;
      }
      button {
        background: var(--sage);
        color: #fff;
        border: 0;
        border-radius: 20px;
        padding: 10px 22px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover { background: var(--sage-dark); }
      .brand {
        position: absolute;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 18px;
        letter-spacing: -0.02em;
      }
      .brand span { color: var(--sage-dark); }
    </style>
  </head>
  <body>
    <div class="brand">Lei<span>.co</span></div>
    <div class="wrap">
      <img class="logo" src="/icon-192.png" alt="Lei.co" />
      <h1>Você está offline</h1>
      <p>Sem conexão no momento. Verifique sua internet e tente de novo — seus dados sincronizam assim que você voltar.</p>
      <button onclick="location.reload()">Tentar novamente</button>
    </div>
  </body>
</html>
